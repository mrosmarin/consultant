name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    # Kill-switch: set the repo variable RUN_CI=false to skip CI while GitHub
    # Actions is over quota (see CONTRIBUTING.md). Unset/anything-else runs CI.
    # Note: GitHub also natively skips runs when the head commit subject
    # contains "[skip ci]".
    if: ${{ vars.RUN_CI != 'false' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Reads the pnpm version from package.json "packageManager".
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo run lint

      - name: Type check
        run: pnpm turbo run check-types

      - name: Build
        run: pnpm turbo run build
        env:
          # Build-only placeholders. The Neon Auth client instantiates at module
          # load during `next build` (and the /api/auth route calls auth.handler()
          # at module scope), so these must be present + non-empty — but the build
          # never connects to any service. Real values live in Vercel for deploys.
          # (DATABASE_URL is unused at build since the db client is lazy — DEV-152 —
          # but a valid placeholder is provided for safety.) The previous
          # `secrets.*` references were empty, which is what broke the build.
          NEON_AUTH_BASE_URL: https://build.placeholder.local
          NEON_AUTH_COOKIE_SECRET: ci-build-only-not-used-at-runtime
          DATABASE_URL: postgresql://build:build@localhost:5432/build
      # - name: Test
      #   run: pnpm turbo run test   # enable once Vitest is wired (no test script yet)
