name: Migrate

# Apply pending Drizzle migrations to the environment that matches the branch:
#   push to develop -> STAGING database
#   push to main    -> PRODUCTION database
# Replaces the manual `make db-migrate` hand-off for staging/prod (DEV-149).
#
# Requires two repo secrets (the DIRECT / unpooled Neon connection strings):
#   STAGING_DATABASE_URL_UNPOOLED
#   PROD_DATABASE_URL_UNPOOLED
# See CONTRIBUTING.md → "Migrations in CI".
#
# Discipline: keep migrations EXPAND/CONTRACT (additive — add columns/tables,
# never rename/drop in the same release). Vercel deploys on push independently
# of Actions, so the migrate job and the deploy race; additive migrations make
# that race harmless (new code tolerates the old schema and vice-versa).

on:
  push:
    branches: [develop, main]
  # Manual trigger: pick the branch to run on (develop → staging, main → prod).
  # Useful for applying a migration without a fresh push.
  workflow_dispatch:

# Never interrupt a migration mid-flight.
concurrency:
  group: migrate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate:
    # Same kill-switch as the quality workflow: set the repo variable
    # RUN_CI=false to skip while Actions is over quota.
    if: ${{ vars.RUN_CI != 'false' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the destructive-SQL guard can diff the push

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Data-safety guard (DEV-150): block auto-applying a DESTRUCTIVE migration
      # to prod without a reviewed data-migration plan. Scans only the migration
      # files changed in THIS push; a file opts in via a
      # `-- destructive-approved: <reason>` line once the plan + prod snapshot are
      # done. Manual workflow_dispatch runs (deliberate) skip this.
      - name: Guard against unapproved destructive migrations
        if: github.event_name == 'push'
        run: |
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            RANGE="HEAD~1 HEAD"   # first push / no before → just the tip commit
          else
            RANGE="$BEFORE ${{ github.sha }}"
          fi
          FILES=$(git diff --name-only --diff-filter=d $RANGE -- 'apps/web/drizzle/*.sql' || true)
          if [ -z "$FILES" ]; then echo "No migration changes in this push."; exit 0; fi
          echo "Changed migrations:"; echo "$FILES"
          DESTRUCTIVE='drop[[:space:]]+(table|column|constraint)|rename[[:space:]]+(to|column)|set[[:space:]]+data[[:space:]]+type|set[[:space:]]+not[[:space:]]+null|truncate|delete[[:space:]]+from'
          BAD=""
          for f in $FILES; do
            [ -f "$f" ] || continue
            if grep -iEq "$DESTRUCTIVE" "$f" && ! grep -iq 'destructive-approved' "$f"; then
              BAD="$BAD $f"
            fi
          done
          if [ -n "$BAD" ]; then
            echo "::error::Destructive migration without a data-migration plan:$BAD"
            echo "Per CONTRIBUTING → 'Migration data safety': write the plan, snapshot prod (Neon branch),"
            echo "backfill + verify, then add a line  -- destructive-approved: <reason>  to the migration."
            exit 1
          fi
          echo "Migrations are additive (or explicitly approved). OK to apply."

      - name: Apply migrations → ${{ github.ref_name == 'main' && 'production' || 'staging' }}
        working-directory: apps/web
        run: pnpm db:migrate
        env:
          # drizzle.config.ts reads DATABASE_URL_UNPOOLED from the env (its
          # dotenv .env.local load is a no-op in CI). Pick the target by branch.
          DATABASE_URL_UNPOOLED: ${{ github.ref_name == 'main' && secrets.PROD_DATABASE_URL_UNPOOLED || secrets.STAGING_DATABASE_URL_UNPOOLED }}
